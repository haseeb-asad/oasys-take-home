# Alembic configuration for Kinetic. The database URL is intentionally absent
# here; migrations/env.py injects it from application settings at runtime, so the
# credential never lives in a tracked file. Logging sections exist so env.py can
# call fileConfig() without error.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is injected by migrations/env.py from app settings; do not set it here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
