name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    # Postgres is wired now so the integration/scenario tests (later phases) run
    # against a real database in CI; the current pure-domain tests ignore it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kinetic
          POSTGRES_PASSWORD: kinetic
          POSTGRES_DB: kinetic
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://kinetic:kinetic@localhost:5432/kinetic
      # Exists only so the DB integration test can boot get_settings(); never signs real tokens.
      JWT_SECRET_KEY: ci-only-secret-not-used-for-signing-0123456789

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (from .python-version)
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Tests
        run: uv run pytest
